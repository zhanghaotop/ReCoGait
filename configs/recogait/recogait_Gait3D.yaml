data_cfg:
  dataset_name: Gait3D
  dataset_root: your path
  dataset_partition: ./datasets/Gait3D/Gait3D.json
  num_workers: 1
  data_in_use: [True, True] 
  remove_no_gallery: false 
  test_dataset_name: Gait3D

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: true
  restore_hint: 40000
  save_name: ReCoGait 
  eval_func: evaluate_Gait3D
  sampler:
    batch_shuffle: false
    batch_size: 4
    sample_type: all_ordered 
    frames_all_limit: 720
  metric: euc # cos
  transform:
    - type: BaseSilTransform

loss_cfg:
  - loss_term_weight: 1.0
    margin: 0.2
    type: TripletLoss
    log_prefix: triplet
  - loss_term_weight: 1.0
    scale: 16
    type: CrossEntropyLoss
    log_prefix: softmax
    log_accuracy: true
  - type: QualityAwareTripletLoss      
    log_prefix: quality_aware
    margin: 0.3
    loss_term_weight: 1.0

model_cfg:
  model: ReCoGait
  Backbone:
    in_channels: 3
    blocks:
      - 1
      - 4
      - 4
      - 1
    C: 2
  SeparateBNNecks:
    class_num: 3000

optimizer_cfg:
  lr: 0.2
  momentum: 0.9
  solver: SGD
  weight_decay: 0.0005

scheduler_cfg:
  gamma: 0.1
  milestones: # Learning Rate Reduction at each milestones
    - 20000
    - 30000
  scheduler: MultiStepLR

trainer_cfg:
  enable_float16: true 
  fix_BN: false
  log_iter: 100
  with_test: true
  restore_ckpt_strict: true
  restore_hint: 0
  save_iter: 10000
  save_name: ReCoGait 
  sync_BN: true
  total_iter: 40000
  sampler:
    batch_shuffle: true
    batch_size:
      - 40 
      - 5  
    frames_num_fixed: 30 
    frames_skip_num: 4
    sample_type: fixed_ordered
    type: TripletSampler
  transform:
    - type: Compose
      trf_cfg:
        - type: RandomPerspective
          prob: 0.2
        - type: BaseSilTransform
        - type: RandomHorizontalFlip
          prob: 0.2
        - type: RandomRotate
          prob: 0.2


